<svg width="1100" height="520" viewBox="0 0 1100 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Open source impact map</title>
  <desc id="desc">A visual map of Saivedant Hava's open source work across LLM internals, performance, observability, type safety, developer tools, and production reliability.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1100" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#030712"/>
      <stop offset="0.52" stop-color="#07111F"/>
      <stop offset="1" stop-color="#101827"/>
    </linearGradient>
    <linearGradient id="line" x1="140" y1="110" x2="940" y2="390" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.5" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(550 246) rotate(90) scale(210 320)">
      <stop stop-color="#38BDF8" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#94A3B8" fill-opacity="0.12"/>
    </pattern>
    <style>
      .mono { font-family: "SFMono-Regular", "Cascadia Code", "Liberation Mono", Consolas, monospace; }
      .sans { font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
      .label { fill: #F8FAFC; font-size: 22px; font-weight: 850; }
      .sub { fill: #94A3B8; font-size: 13px; }
      .tag { fill: #CBD5E1; font-size: 12px; font-weight: 800; letter-spacing: 0.8px; }
      .repo { fill: #E2E8F0; font-size: 15px; font-weight: 800; }
      .trace { stroke-dasharray: 9 13; animation: drift 9s linear infinite; }
      .beat { animation: beat 3s ease-in-out infinite; transform-origin: center; }
      @keyframes drift { to { stroke-dashoffset: -90; } }
      @keyframes beat { 0%,100% { opacity: 0.58; } 50% { opacity: 1; } }
    </style>
  </defs>

  <rect width="1100" height="520" rx="26" fill="url(#panel)"/>
  <rect width="1100" height="520" rx="26" fill="url(#dots)"/>
  <rect width="1100" height="520" rx="26" fill="url(#coreGlow)"/>

  <text class="mono" x="64" y="64" fill="#38BDF8" font-size="14" font-weight="800" letter-spacing="1.8">OSS IMPACT MAP</text>
  <text class="sans" x="64" y="103" fill="#F8FAFC" font-size="34" font-weight="900">Where the work lands</text>
  <text class="mono" x="64" y="132" fill="#94A3B8" font-size="15">Production fixes across model APIs, observability, optimization, and DX.</text>

  <path class="trace" d="M344 215 C252 150 193 167 146 215" stroke="url(#line)" stroke-width="2.2" stroke-opacity="0.72"/>
  <path class="trace" d="M410 198 C470 88 650 78 754 112" stroke="url(#line)" stroke-width="2.2" stroke-opacity="0.72"/>
  <path class="trace" d="M690 198 C720 144 805 142 872 190" stroke="url(#line)" stroke-width="2.2" stroke-opacity="0.72"/>
  <path class="trace" d="M748 256 C840 241 909 276 958 340" stroke="url(#line)" stroke-width="2.2" stroke-opacity="0.72"/>
  <path class="trace" d="M642 333 C676 405 630 447 550 435" stroke="url(#line)" stroke-width="2.2" stroke-opacity="0.72"/>
  <path class="trace" d="M448 333 C383 403 292 403 218 348" stroke="url(#line)" stroke-width="2.2" stroke-opacity="0.72"/>

  <g transform="translate(405 185)">
    <rect width="290" height="150" rx="24" fill="#020617" fill-opacity="0.84" stroke="#38BDF8" stroke-opacity="0.52"/>
    <circle class="beat" cx="145" cy="38" r="18" fill="#38BDF8" fill-opacity="0.22" filter="url(#glow)"/>
    <text class="sans" x="145" y="77" fill="#F8FAFC" font-size="31" font-weight="900" text-anchor="middle">Open Source</text>
    <text class="sans" x="145" y="109" fill="#FACC15" font-size="31" font-weight="900" text-anchor="middle">AI Infrastructure</text>
    <text class="mono sub" x="145" y="133" text-anchor="middle">merged PRs with production impact</text>
  </g>

  <g transform="translate(70 184)">
    <rect width="222" height="92" rx="19" fill="#0F172A" fill-opacity="0.88" stroke="#38BDF8" stroke-opacity="0.45"/>
    <text class="sans label" x="22" y="34">LLM internals</text>
    <text class="mono sub" x="22" y="58">SwiGLU + position_ids</text>
    <text class="mono tag" x="22" y="78">PYTORCH / TRANSFORMERS</text>
  </g>

  <g transform="translate(738 60)">
    <rect width="250" height="92" rx="19" fill="#0F172A" fill-opacity="0.88" stroke="#F59E0B" stroke-opacity="0.45"/>
    <text class="sans label" x="22" y="34">Model APIs</text>
    <text class="mono sub" x="22" y="58">compatibility for attention paths</text>
    <text class="mono tag" x="22" y="78">BLOOM / ROFORMER / MPT</text>
  </g>

  <g transform="translate(790 178)">
    <rect width="252" height="98" rx="19" fill="#0F172A" fill-opacity="0.88" stroke="#22C55E" stroke-opacity="0.45"/>
    <text class="sans label" x="22" y="34">Performance fixes</text>
    <text class="mono sub" x="22" y="58">O(n^2) prompt growth removed</text>
    <text class="mono tag" x="22" y="80">OPENLIT</text>
  </g>

  <g transform="translate(814 328)">
    <rect width="240" height="98" rx="19" fill="#0F172A" fill-opacity="0.88" stroke="#A78BFA" stroke-opacity="0.45"/>
    <text class="sans label" x="22" y="34">Observability</text>
    <text class="mono sub" x="22" y="58">context leaks + metric format bugs</text>
    <text class="mono tag" x="22" y="80">OPENLLMETRY / BENTOML</text>
  </g>

  <g transform="translate(432 376)">
    <rect width="238" height="92" rx="19" fill="#0F172A" fill-opacity="0.88" stroke="#FB7185" stroke-opacity="0.45"/>
    <text class="sans label" x="22" y="34">Type safety</text>
    <text class="mono sub" x="22" y="58">samplers, pruners, visualization</text>
    <text class="mono tag" x="22" y="78">OPTUNA</text>
  </g>

  <g transform="translate(80 322)">
    <rect width="254" height="96" rx="19" fill="#0F172A" fill-opacity="0.88" stroke="#FACC15" stroke-opacity="0.45"/>
    <text class="sans label" x="22" y="34">Devtools + CI</text>
    <text class="mono sub" x="22" y="58">CLI errors, Ruff hardening, docs</text>
    <text class="mono tag" x="22" y="80">FIRE / FAST-F1 / CSCOUT</text>
  </g>

  <g transform="translate(64 476)">
    <rect width="972" height="1" fill="#334155"/>
    <text class="mono repo" x="0" y="34">PyTorch</text>
    <text class="mono repo" x="114" y="34">Transformers</text>
    <text class="mono repo" x="260" y="34">Optuna</text>
    <text class="mono repo" x="369" y="34">OpenLIT</text>
    <text class="mono repo" x="484" y="34">OpenLLMetry</text>
    <text class="mono repo" x="636" y="34">BentoML</text>
    <text class="mono repo" x="752" y="34">DSPy</text>
    <text class="mono repo" x="840" y="34">Fast-F1</text>
  </g>

  <rect x="1" y="1" width="1098" height="518" rx="25" stroke="url(#line)" stroke-opacity="0.42" stroke-width="2"/>
</svg>
